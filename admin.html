<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahaamtec Admin – Reviews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #050d1a; --navy2: #0a1628; --navy3: #0f1f3d;
    --cyan: #00c8f8; --cyan2: #00a8d4;
    --white: #f0f4ff; --white-dim: rgba(240,244,255,0.7);
    --border: rgba(0,200,248,0.2); --gold: #f4c430; --red: #e63946;
  }
  body { background: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* LOGIN SCREEN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 14px;
    padding: 40px 32px; max-width: 380px; width: 100%;
  }
  .login-card h1 {
    font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700;
    text-align: center; margin-bottom: 6px;
  }
  .login-card h1 span { color: var(--cyan); }
  .login-sub { text-align: center; color: var(--white-dim); font-size: 0.85rem; margin-bottom: 28px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--white-dim); }
  .form-group input {
    background: var(--navy3); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; color: var(--white); font-size: 0.9rem; outline: none;
  }
  .form-group input:focus { border-color: var(--cyan); }
  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 44px; }
  .password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--white-dim);
    font-size: 0.78rem; letter-spacing: 0.03em; padding: 4px;
  }
  .password-toggle:hover { color: var(--cyan); }
  .btn-login {
    width: 100%; padding: 13px; background: var(--cyan); color: var(--navy);
    border: none; border-radius: 6px; font-weight: 700; font-size: 0.9rem;
    letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; margin-top: 8px;
  }
  .btn-login:hover { background: var(--cyan2); }
  .login-error { color: var(--red); font-size: 0.82rem; text-align: center; margin-top: 14px; min-height: 18px; }

  /* DASHBOARD */
  .dash { display: none; max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
  .dash-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 30px; flex-wrap: wrap; gap: 12px;
  }
  .dash-header h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; }
  .dash-header h1 span { color: var(--cyan); }
  .btn-logout {
    background: transparent; border: 1px solid var(--border); color: var(--white-dim);
    padding: 8px 18px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .stat-row { display: flex; gap: 14px; margin-bottom: 30px; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 130px; background: var(--navy2); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s;
  }
  .stat-box:hover { border-color: var(--cyan); }
  .stat-box.active-filter { border-color: var(--cyan); background: rgba(0,200,248,0.08); }
  .stat-box .num { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 900; color: var(--cyan); }
  .stat-box .lbl { font-size: 0.72rem; color: var(--white-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .filter-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-tab {
    background: var(--navy2); border: 1px solid var(--border); color: var(--white-dim);
    padding: 8px 16px; border-radius: 100px; font-size: 0.8rem; cursor: pointer;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .filter-tab:hover { border-color: var(--cyan); color: var(--white); }
  .filter-tab.active { background: var(--cyan); border-color: var(--cyan); color: var(--navy); font-weight: 600; }
  .sort-select {
    background: var(--navy2); border: 1px solid var(--border); color: var(--white);
    padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
    font-family: 'Inter', sans-serif; outline: none;
  }
  .sort-select:focus { border-color: var(--cyan); }
  .sort-select option { background: var(--navy2); }

  .review-row {
    background: var(--navy2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .review-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .review-row-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem; }
  .review-row-date { font-size: 0.75rem; color: var(--white-dim); }
  .review-row-stars { color: var(--gold); margin-bottom: 8px; }
  .review-row-text { font-size: 0.9rem; color: var(--white-dim); line-height: 1.6; margin-bottom: 14px; }

  .reply-existing {
    background: rgba(0,200,248,0.06); border-left: 2px solid var(--cyan);
    border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.85rem;
  }
  .reply-existing .lbl { color: var(--cyan); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
  .btn-edit-reply {
    background: transparent; border: 1px solid var(--border); color: var(--cyan);
    padding: 7px 16px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.03em; margin-top: 4px;
  }
  .btn-edit-reply:hover { background: rgba(0,200,248,0.1); border-color: var(--cyan); }

  .new-badge {
    display: inline-block; background: var(--cyan); color: var(--navy);
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 100px; margin-left: 8px; vertical-align: middle;
  }

  .reply-box { display: flex; flex-direction: column; gap: 10px; }
  .reply-box textarea {
    background: var(--navy3); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; color: var(--white); font-size: 0.88rem; min-height: 70px;
    font-family: 'Inter', sans-serif; resize: vertical; outline: none;
  }
  .reply-box textarea:focus { border-color: var(--cyan); }
  .reply-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-reply, .btn-delete {
    padding: 9px 18px; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; border: none; letter-spacing: 0.03em;
  }
  .btn-reply { background: var(--cyan); color: var(--navy); }
  .btn-reply:hover { background: var(--cyan2); }
  .btn-delete { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-delete:hover { background: var(--red); color: white; }

  .empty-state { text-align: center; color: var(--white-dim); padding: 60px 20px; font-size: 0.9rem; }
  .loading-state { text-align: center; color: var(--white-dim); padding: 60px 20px; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>SAHAAM<span>TEC</span> Admin</h1>
    <p class="login-sub">Review Management Dashboard</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="you@sahaamtec.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="adminPassword" placeholder="••••••••">
        <button type="button" class="password-toggle" onclick="togglePassword()" id="pwToggleBtn">SHOW</button>
      </div>
    </div>
    <button class="btn-login" onclick="doLogin()">Log In</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<div class="dash" id="dash">
  <div class="dash-header">
    <h1>SAHAAM<span>TEC</span> &middot; Reviews Admin</h1>
    <button class="btn-logout" onclick="doLogout()">Log Out</button>
  </div>

  <div class="stat-row">
    <div class="stat-box" data-filter="all" onclick="setFilter('all')"><div class="num" id="statTotal">0</div><div class="lbl">Total Reviews</div></div>
    <div class="stat-box" data-filter="avg-noop" onclick="setFilter('all')"><div class="num" id="statAvg">0.0</div><div class="lbl">Average Rating</div></div>
    <div class="stat-box" data-filter="replied" onclick="setFilter('replied')"><div class="num" id="statReplied">0</div><div class="lbl">Replied</div></div>
    <div class="stat-box" data-filter="pending" onclick="setFilter('pending')"><div class="num" id="statPending">0</div><div class="lbl">Awaiting Reply</div></div>
  </div>

  <div class="filter-row">
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-tab" data-filter="new" onclick="setFilter('new')">New (24h)</button>
      <button class="filter-tab" data-filter="pending" onclick="setFilter('pending')">Awaiting Reply</button>
      <button class="filter-tab" data-filter="replied" onclick="setFilter('replied')">Replied</button>
    </div>
    <select class="sort-select" id="sortSelect" onchange="renderFilteredReviews()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <div id="reviewsList">
    <div class="loading-state">Loading reviews&hellip;</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBfl9M4lF0xba9Jl58D37gsGi025tJRYZY",
    authDomain: "sahaamtec.firebaseapp.com",
    databaseURL: "https://sahaamtec-default-rtdb.firebaseio.com",
    projectId: "sahaamtec",
    storageBucket: "sahaamtec.firebasestorage.app",
    messagingSenderId: "142015052562",
    appId: "1:142015052562:web:580eaa9955fe722212d1cb"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  function togglePassword() {
    const input = document.getElementById('adminPassword');
    const btn = document.getElementById('pwToggleBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = 'HIDE';
    } else {
      input.type = 'password';
      btn.textContent = 'SHOW';
    }
  }

  function doLogin() {
    const email = document.getElementById('adminEmail').value.trim();
    const pass = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    if (!email || !pass) {
      errEl.textContent = 'Please enter both email and password.';
      return;
    }
    auth.signInWithEmailAndPassword(email, pass).catch((err) => {
      errEl.textContent = 'Login failed: incorrect email or password.';
    });
  }

  function doLogout() {
    auth.signOut();
  }

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      loadReviews();
    } else {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dash').style.display = 'none';
    }
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderStars(n) {
    let s = '';
    for (let i = 1; i <= 5; i++) s += (i <= n) ? '★' : '☆';
    return s;
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  let allReviews = [];
  let currentFilter = 'all';
  const editingIds = new Set();

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.filter === filter);
    });
    document.querySelectorAll('.stat-box').forEach(b => {
      b.classList.toggle('active-filter', b.dataset.filter === filter);
    });
    renderFilteredReviews();
  }

  function loadReviews() {
    db.ref('reviews').on('value', (snap) => {
      const data = snap.val();
      allReviews = data ? Object.entries(data).map(([id, r]) => ({ id, ...r })) : [];
      updateStats();
      renderFilteredReviews();
    });
  }

  function updateStats() {
    const total = allReviews.length;
    const avg = total ? (allReviews.reduce((s, r) => s + (r.rating || 0), 0) / total) : 0;
    const replied = allReviews.filter(r => r.adminReply && r.adminReply.trim()).length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAvg').textContent = avg.toFixed(1);
    document.getElementById('statReplied').textContent = replied;
    document.getElementById('statPending').textContent = total - replied;
  }

  function isNew(ts) {
    return (Date.now() - (ts || 0)) < (24 * 60 * 60 * 1000);
  }

  function renderFilteredReviews() {
    const listEl = document.getElementById('reviewsList');
    const sortVal = document.getElementById('sortSelect').value;

    let filtered = allReviews.slice();
    if (currentFilter === 'replied') {
      filtered = filtered.filter(r => r.adminReply && r.adminReply.trim());
    } else if (currentFilter === 'pending') {
      filtered = filtered.filter(r => !r.adminReply || !r.adminReply.trim());
    } else if (currentFilter === 'new') {
      filtered = filtered.filter(r => isNew(r.createdAt));
    }

    filtered.sort((a, b) => sortVal === 'oldest'
      ? (a.createdAt || 0) - (b.createdAt || 0)
      : (b.createdAt || 0) - (a.createdAt || 0));

    if (!allReviews.length) {
      listEl.innerHTML = '<div class="empty-state">No reviews yet.</div>';
      return;
    }
    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty-state">No reviews match this filter.</div>';
      return;
    }

    listEl.innerHTML = filtered.map(r => {
      const hasReply = r.adminReply && r.adminReply.trim();
      const editing = editingIds.has(r.id);
      const showTextarea = !hasReply || editing;

      return `
        <div class="review-row" id="row-${r.id}">
          <div class="review-row-top">
            <div>
              <div class="review-row-name">
                ${escapeHtml(r.name || 'Anonymous')}
                ${isNew(r.createdAt) ? '<span class="new-badge">New</span>' : ''}
              </div>
              <div class="review-row-date">${formatDate(r.createdAt || 0)}</div>
            </div>
          </div>
          <div class="review-row-stars">${renderStars(r.rating || 0)}</div>
          <div class="review-row-text">"${escapeHtml(r.comment || '')}"</div>
          ${hasReply ? `
            <div class="reply-existing">
              <span class="lbl">Current Reply</span>
              ${escapeHtml(r.adminReply)}
            </div>` : ''}
          ${showTextarea ? `
            <div class="reply-box">
              <textarea id="reply-${r.id}" placeholder="Write a reply to this review...">${hasReply ? escapeHtml(r.adminReply) : ''}</textarea>
              <div class="reply-actions">
                <button class="btn-reply" onclick="saveReply('${r.id}')">Save Reply</button>
                ${hasReply ? `<button class="btn-edit-reply" onclick="cancelEdit('${r.id}')">Cancel</button>` : ''}
                <button class="btn-delete" onclick="deleteReview('${r.id}')">Delete Review</button>
              </div>
            </div>
          ` : `
            <div class="reply-actions">
              <button class="btn-edit-reply" onclick="startEdit('${r.id}')">Edit Reply</button>
              <button class="btn-delete" onclick="deleteReview('${r.id}')">Delete Review</button>
            </div>
          `}
        </div>
      `;
    }).join('');
  }

  function startEdit(id) {
    editingIds.add(id);
    renderFilteredReviews();
  }

  function cancelEdit(id) {
    editingIds.delete(id);
    renderFilteredReviews();
  }

  function saveReply(id) {
    const text = document.getElementById('reply-' + id).value.trim();
    db.ref('reviews/' + id + '/adminReply').set(text).then(() => {
      editingIds.delete(id);
    }).catch(() => {
      alert('Failed to save reply. Please try again.');
    });
  }

  function deleteReview(id) {
    if (!confirm('Delete this review permanently? This cannot be undone.')) return;
    db.ref('reviews/' + id).remove().catch(() => {
      alert('Failed to delete. Please try again.');
    });
  }
</script>
</body>
</html>
